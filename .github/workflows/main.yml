name: Q Edu Backend CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - production
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "22"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/q_edu_backend
  DATABASE_URL: mysql://root:root@127.0.0.1:3306/qedu_ci
  JWT_ACCESS_SECRET: ci-jwt-access-secret

jobs:
  verify:
    name: Generate & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/production' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: mkdir -p /opt/qedu

      - name: Upload compose and nginx files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "deploy/production/docker-compose.yml,deploy/production/nginx.conf"
          target: "/opt/qedu"
          strip_components: 2

      - name: Pull and restart backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            mkdir -p /opt/qedu
            cd /opt/qedu

            cat > .env <<'EOF'
            FRONTEND_IMAGE=ghcr.io/abdullah117765/saas:latest
            BACKEND_IMAGE=ghcr.io/abdullah117765/q_edu_backend:latest
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE || 'qedu' }}
            MYSQL_USER=${{ secrets.MYSQL_USER || 'qedu' }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD || 'change-this-qedu-db-password' }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD || 'change-this-root-db-password' }}
            NODE_ENV=production
            PORT=3000
            PRISMA_MIGRATE_DEPLOY=true
            DATABASE_URL=${{ secrets.DATABASE_URL || 'mysql://qedu:change-this-qedu-db-password@mysql:3306/qedu' }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_ACCESS_EXPIRES_IN=${{ secrets.JWT_ACCESS_EXPIRES_IN || '15m' }}
            JWT_REFRESH_TTL_SECONDS=${{ secrets.JWT_REFRESH_TTL_SECONDS || '604800' }}
            AUTH_ACCESS_TOKEN_COOKIE_NAME=${{ secrets.AUTH_ACCESS_TOKEN_COOKIE_NAME || 'qedu_access_token' }}
            AUTH_REFRESH_TOKEN_COOKIE_NAME=${{ secrets.AUTH_REFRESH_TOKEN_COOKIE_NAME || 'qedu_refresh_token' }}
            AUTH_COOKIE_DOMAIN=${{ secrets.AUTH_COOKIE_DOMAIN }}
            AUTH_COOKIE_SECURE=${{ secrets.AUTH_COOKIE_SECURE || 'true' }}
            AUTH_COOKIE_SAMESITE=${{ secrets.AUTH_COOKIE_SAMESITE || 'lax' }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS || 'http://161.97.163.157' }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE || 'false' }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            ZOOM_ENABLED=${{ secrets.ZOOM_ENABLED || 'false' }}
            ZOOM_ACCOUNT_ID=${{ secrets.ZOOM_ACCOUNT_ID }}
            ZOOM_CLIENT_ID=${{ secrets.ZOOM_CLIENT_ID }}
            ZOOM_CLIENT_SECRET=${{ secrets.ZOOM_CLIENT_SECRET }}
            ZOOM_API_BASE_URL=${{ secrets.ZOOM_API_BASE_URL || 'https://api.zoom.us/v2' }}
            ZOOM_OAUTH_URL=${{ secrets.ZOOM_OAUTH_URL || 'https://zoom.us/oauth/token' }}
            ZOOM_WEBHOOK_VERIFICATION_TOKEN=${{ secrets.ZOOM_WEBHOOK_VERIFICATION_TOKEN }}
            ZOOM_CLASS_CREDIT_COST=${{ secrets.ZOOM_CLASS_CREDIT_COST || '1' }}
            ACADEMY_OWNER_INITIAL_FREE_CREDITS=${{ secrets.ACADEMY_OWNER_INITIAL_FREE_CREDITS || '100' }}
            FILE_STORAGE_DRIVER=local
            LOCAL_STORAGE_ROOT=/app/storage/uploads
            FILE_STORAGE_PUBLIC_ROOT=/storage
            FILE_STORAGE_PUBLIC_URL=${{ secrets.FILE_STORAGE_PUBLIC_URL || 'http://161.97.163.157' }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_API_VERSION=${{ secrets.STRIPE_API_VERSION || '2024-06-20' }}
            STRIPE_CURRENCY=${{ secrets.STRIPE_CURRENCY || 'usd' }}
            STRIPE_SUCCESS_URL=${{ secrets.STRIPE_SUCCESS_URL || 'http://161.97.163.157/billing/success?session_id={CHECKOUT_SESSION_ID}' }}
            STRIPE_CANCEL_URL=${{ secrets.STRIPE_CANCEL_URL || 'http://161.97.163.157/billing/cancel' }}
            STRIPE_PORTAL_RETURN_URL=${{ secrets.STRIPE_PORTAL_RETURN_URL || 'http://161.97.163.157/academy/billing' }}
            PLATFORM_FEE_PERCENT=${{ secrets.PLATFORM_FEE_PERCENT || '10' }}
            SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
            SUPER_ADMIN_PASSWORD=${{ secrets.SUPER_ADMIN_PASSWORD }}
            SUPER_ADMIN_FIRST_NAME=${{ secrets.SUPER_ADMIN_FIRST_NAME || 'Super' }}
            SUPER_ADMIN_LAST_NAME=${{ secrets.SUPER_ADMIN_LAST_NAME || 'Admin' }}
            EOF
            chmod 600 .env

            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker compose pull backend
            docker compose up -d --no-deps backend
            docker compose up -d --no-deps nginx

            docker image prune -f
